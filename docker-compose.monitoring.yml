version: "3.9"

# Stateform monitoring stack
# Usage: docker compose -f docker-compose.monitoring.yml up -d
#
# Grafana:    http://localhost:3000  (admin / admin)
# Prometheus: http://localhost:9090

services:

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: stateform-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle          # POST /-/reload to hot-reload config
      - --web.enable-admin-api
    ports:
      - "9090:9090"
    networks: [monitoring]

  grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: stateform-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/stateform-gateway.json
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks: [monitoring]
    depends_on: [prometheus]

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
